<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>实时字幕助手</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 360px; padding: 12px; color:#1e293b; }
    h3 { margin: 0 0 8px 0; font-size:16px; }
    .row { display:flex; align-items:center; justify-content: space-between; padding:6px 0; }
    .btn { padding:8px 12px; border-radius:6px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    .btn[disabled] { opacity: .6; cursor: not-allowed; }
    #record-progress { height: 8px; background:#e2e8f0; border-radius:6px; overflow:hidden; margin-top:8px; display:none; }
    #record-bar { height:100%; width:100%; background: linear-gradient(90deg, #34d399, #10b981); transform: translateX(-100%); }
    #record-bar.recording { animation: record-indeterminate 1.2s ease-in-out infinite; }
    @keyframes record-indeterminate {
      0% { transform: translateX(-100%); opacity: .6; }
      50% { opacity: 1; }
      100% { transform: translateX(100%); opacity: .6; }
    }
    #time-label { font-family: monospace; font-size:12px; color:#334155; text-align:right; margin-top:6px; }
    #video-list { margin-top:8px; max-height:260px; overflow:auto; border-top:1px solid #e2e8f0; padding-top:12px; font-size:12px; color:#64748b; }
    .video-item { padding:6px 0; border-bottom:1px solid #f1f5f9; }
    .video-url { font-weight:600; color:#4F46E5; word-break:break-all; }
    /* 简易开关样式（原 HTML 有 switch/slider 但缺样式） */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .2s; border-radius: 999px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; top: 3px; background-color: white; transition: .2s; border-radius: 999px; }
    input:checked + .slider { background-color: #10b981; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <h3>实时字幕助手</h3>
  <div class="row">
    <span>启用插件</span>
    <label class="switch">
      <input type="checkbox" id="toggle-enabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row" style="gap:8px;">
    <button id="subtitleBtn" class="btn">字幕未开启</button>
    <button id="recordBtn" class="btn" style="margin-left:8px;">开始录音</button>
  </div>

  <div id="record-progress" aria-label="record-progress">
    <div id="record-bar"></div>
  </div>
  <div id="time-label">00:00</div>

  <div id="video-list">
    <div class="empty">加载中...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
